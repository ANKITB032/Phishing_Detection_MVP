name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Only grab the latest commit to save runner space

      - name: Prepare Production Package
        run: |
          # 1. Create an isolated deployment directory
          mkdir ../deploy_dir
          
          # 2. Inject the YAML frontmatter directly into a fresh deployment README
          cat << 'EOF' > ../deploy_dir/README.md
          ---
          title: Phishing Detection API
          emoji: 🛡️
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          pinned: false
          ---

          # PhishGuard MVP API
          This backend powers the Phishing Detection application.

          EOF
          
          # Append your clean local README content to the deployment README
          cat README.md >> ../deploy_dir/README.md
          
          # 3. Copy ONLY the critical files required for your Space to build and execute
          cp Dockerfile ../deploy_dir/
          cp requirements.txt ../deploy_dir/
          cp main.py ../deploy_dir/
          cp predictor.py ../deploy_dir/
          
          # Copy your model directory structure
          mkdir -p ../deploy_dir/04_Saved_Models
          cp -r 04_Saved_Models/* ../deploy_dir/04_Saved_Models/

      - name: Push Single Commit to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Navigate into our pristine deployment directory
          cd ../deploy_dir
          
          # Initialize a completely fresh, history-free git repository
          git init -b main
          git config user.email "action@github.com"
          git config user.name "GitHub Action Bot"
          
          # Stage and commit only the production files
          git add .
          git commit -m "deploy: production release"
          
          # Force push this single, ultra-light commit to Hugging Face
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/ab2403/phishguard-api.git
          git push hf main --force