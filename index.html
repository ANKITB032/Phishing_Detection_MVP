<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --border: #1e2d3d;
      --accent: #00e5ff;
      --danger: #ff3b5c;
      --safe: #00e676;
      --muted: #4a6070;
      --text: #c9d8e3;
      --text-dim: #546e7a;
      --glow-safe: 0 0 24px rgba(0, 230, 118, .35);
      --glow-danger: 0 0 24px rgba(255, 59, 92, .35);
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, .03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
    }

    header {
      margin-bottom: 3rem;
      text-align: center;
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: .8;
    }

    h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: .75rem;
      font-size: .875rem;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: .02em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2rem;
    }

    .field-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .7rem;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .5rem;
      display: block;
    }

    .input-row {
      display: flex;
      gap: .75rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .75rem 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .875rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }

    input[type="text"]::placeholder {
      color: var(--text-dim);
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 4px;
      padding: .75rem 1.4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .08em;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }

    button:hover {
      opacity: .85;
    }

    button:active {
      transform: scale(.97);
    }

    button:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
    }

    /* result */
    #result {
      margin-top: 1.5rem;
      display: none;
    }

    .result-inner {
      border-radius: 4px;
      border: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-inner.safe {
      border-color: var(--safe);
      background: rgba(0, 230, 118, .05);
      box-shadow: var(--glow-safe);
    }

    .result-inner.danger {
      border-color: var(--danger);
      background: rgba(255, 59, 92, .05);
      box-shadow: var(--glow-danger);
    }

    .verdict-icon {
      font-size: 2rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .verdict-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .safe .verdict-label {
      color: var(--safe);
    }

    .danger .verdict-label {
      color: var(--danger);
    }

    .verdict-conf {
      font-size: .78rem;
      color: var(--text-dim);
      margin-top: .2rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    .verdict-reason {
      font-size: .75rem;
      color: var(--text);
      margin-top: .5rem;
      font-family: 'IBM Plex Mono', monospace;
      line-height: 1.5;
      padding-top: .4rem;
      border-top: 1px solid var(--border);
    }

    .verdict-reason::before {
      content: '› ';
      color: var(--accent);
      font-weight: 700;
    }

    .verdict-url {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .4rem;
      word-break: break-all;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* error */
    #error {
      display: none;
      margin-top: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .78rem;
      color: var(--danger);
      padding: .6rem 1rem;
      border: 1px solid rgba(255, 59, 92, .3);
      border-radius: 4px;
      background: rgba(255, 59, 92, .05);
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: .72rem;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: .05em;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <p class="logo">Security / ML</p>
      <h1>Phish<span>Guard</span></h1>
      <p class="subtitle">Paste any URL to scan it against our trained detection model.</p>
    </header>

    <div class="card">
      <label class="field-label" for="url-input">Target URL</label>
      <div class="input-row">
        <input id="url-input" type="text" placeholder="https://example.com/path?q=1" autocomplete="off"
          spellcheck="false" />
        <button id="scan-btn" onclick="scan()">Scan</button>
      </div>

      <div id="error"></div>

      <div id="result">
        <div class="result-inner" id="result-inner">
          <div class="verdict-icon" id="verdict-icon"></div>
          <div>
            <div class="verdict-label" id="verdict-label"></div>
            <div class="verdict-conf" id="verdict-conf"></div>
            <div class="verdict-reason" id="verdict-reason"></div>
            <div class="verdict-url" id="verdict-url"></div>
          </div>
        </div>
      </div>
    </div>

    <footer>PhishGuard MVP &mdash; Random Forest · 91% accuracy · ROC-AUC 0.96</footer>
  </div>

  <script>
    const API = "https://ab2403-phishing-detection-mvp.hf.space/predict";   // same-origin on Vercel; change to full URL for local dev

    const $ = id => document.getElementById(id);

    $("url-input").addEventListener("keydown", e => {
      if (e.key === "Enter") scan();
    });

    async function scan() {
      const url = $("url-input").value.trim();
      if (!url) return;

      $("error").style.display = "none";
      $("result").style.display = "none";
      $("scan-btn").disabled = true;
      $("scan-btn").textContent = "Scanning…";

      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });

        if (!res.ok) throw new Error(`Server error ${res.status}`);

        const data = await res.json();
        const safe = data.label === 0;

        $("result-inner").className = "result-inner " + (safe ? "safe" : "danger");
        $("verdict-icon").textContent = safe ? "✓" : "⚠";
        $("verdict-label").textContent = data.verdict;
        $("verdict-conf").textContent = `Confidence: ${data.confidence}%`;
        $("verdict-reason").textContent = data.reason || "";
        $("verdict-url").textContent = data.url;
        $("result").style.display = "block";

      } catch (err) {
        $("error").textContent = "Error: " + err.message;
        $("error").style.display = "block";
      } finally {
        $("scan-btn").disabled = false;
        $("scan-btn").textContent = "Scan";
      }
    }
  </script>
</body>

</html>
